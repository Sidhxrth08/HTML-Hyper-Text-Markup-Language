<HTML>
    <HEAD>
        <TITLE>
            TEXT FORMATTING TAGS
        </TITLE>
    </HEAD>
    <BODY bgcolor="radish">
               <h><FONT size="7" color="red" ALIGN="CENTER">TEXT FORMATTING TAGS</FONT></h>
        <TABLE BORDER="2" STYLE="BORDER-COLLAPSE: COLLAPSE;" ALIGN="CENTER">
            <TR>
                <TH>HTML tag</TH>
                <TH>OUTPUT</TH>
            </TR>
            <TR>
                <TD>normal text</TD>
                <td>hello world</td>
            </TR>
            <tr>
                <td>font& its attributes</td>
                <td><font color=blue size="5">hello world</td></font>
            </tr>
            <tr>
                <td>B</td>
                <TD><b>bold</b></TD>
            </tr>
            <TR>
                <TD>I</TD>
                <TD><I>Italic</I></TD>
            </TR>
            <tr>
                <td>U</td>
                <TD><u>Underline</u></TD>
            </tr>
            <tr>
                <td>EM</td>
                <td><em>Emphasis</em></td>
            </tr>
            <tr>
                <td>STRONG</td>
                <td><strong>strong</strong></td>
            </tr>
            <tr>
                <td>TELETYPE</td> 
            <td><teletype>teletype</teletype></td>            
            </tr>
            <tr>
                <td>CITE</td>
                <td><cite>Citation</cite></td>
            </tr>
            <tr>
                <td>STRIKE</td>
                <TD><strike>STRIKE</strike></td>
            </tr>
            <TR>
                <TD>BIG</TD>
                <TD><big>BIG</big></TD>
            </TR>
            <TR>
                <TD>SMALL</TD>
                <td><small>SMALL</small></td>
            </TR>
            <TR>
                <TD>SUB</TD>
                <TD>a<sub>b</sub></TD>
            </TR>
            <tr>
                <td>SUP</td>
                <td>a<sup>b</sup></td>
            </tr>
        </TABLE>
    </BODY>
</HTML>
